<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Noa Budget">
  <meta name="theme-color" content="#6C63FF">
  <title>Noa Budget</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #6C63FF;
      --primary-light: #8B85FF;
      --danger: #FF6B6B;
      --success: #51CF66;
      --bg: #F0F2F5;
      --card: #FFFFFF;
      --text: #1A1A2E;
      --text-light: #6B7280;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      padding: 20px 20px 30px;
      text-align: center;
      position: relative;
    }

    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

    .container { max-width: 480px; margin: 0 auto; padding: 0 16px; }

    .budget-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      margin: -20px 16px 16px;
      max-width: 448px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 1;
    }

    .budget-card .label { font-size: 0.75rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .budget-card .amount { font-size: 2.2rem; font-weight: 700; margin: 4px 0; }
    .budget-card .amount.positive { color: var(--success); }
    .budget-card .amount.negative { color: var(--danger); }
    .budget-card .amount.zero { color: var(--text-light); }

    .budget-row {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #F0F2F5;
    }

    .budget-row .col { text-align: center; flex: 1; }
    .budget-row .col .val { font-size: 1.1rem; font-weight: 600; }
    .budget-row .col .val.green { color: var(--success); }
    .budget-row .col .val.red { color: var(--danger); }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #F0F2F5;
      border-radius: 4px;
      margin-top: 16px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease, background 0.4s ease;
      background: var(--success);
    }

    .progress-bar .fill.warning { background: #FFC107; }
    .progress-bar .fill.danger { background: var(--danger); }

    .section { margin: 16px auto; max-width: 480px; padding: 0 16px; }
    .section-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 12px; color: var(--text-light); }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .form-row:last-child { margin-bottom: 0; }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      background: #FAFAFA;
    }

    input:focus, select:focus { border-color: var(--primary); background: white; }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    button:active { transform: scale(0.97); }

    .btn-primary { background: var(--primary); color: white; width: 100%; }
    .btn-primary:hover { opacity: 0.9; }

    .btn-set { background: var(--primary); color: white; white-space: nowrap; }

    .expense-list { list-style: none; }

    .expense-item {
      display: flex;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #F0F2F5;
    }

    .expense-item:last-child { border-bottom: none; }

    .expense-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: white;
      margin-right: 12px;
      flex-shrink: 0;
    }

    .expense-avatar.person1 { background: var(--primary); }
    .expense-avatar.person2 { background: #FF6B9D; }

    .expense-info { flex: 1; min-width: 0; }
    .expense-info .desc { font-weight: 500; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expense-info .meta { font-size: 0.75rem; color: var(--text-light); margin-top: 2px; }

    .expense-amount { font-weight: 700; font-size: 1rem; color: var(--danger); margin-left: 8px; white-space: nowrap; }

    .expense-delete {
      background: none;
      border: none;
      padding: 8px;
      margin-left: 4px;
      cursor: pointer;
      color: #CCC;
      font-size: 1.1rem;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .expense-delete:hover { color: var(--danger); background: #FFF0F0; }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }

    .setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      padding: 20px;
    }

    .setup-screen .card { width: 100%; max-width: 400px; text-align: center; }
    .setup-screen h2 { font-size: 1.3rem; margin-bottom: 4px; }
    .setup-screen p { color: var(--text-light); font-size: 0.85rem; margin-bottom: 20px; }
    .setup-screen input { margin-bottom: 12px; }

    .tab-bar {
      display: flex;
      gap: 4px;
      background: #F0F2F5;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 14px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      background: transparent;
      color: var(--text-light);
      transition: all 0.2s;
    }

    .tab.active { background: white; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    .settings-btn {
      position: absolute;
      top: 20px;
      right: 16px;
      background: rgba(255,255,255,0.2);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.visible { opacity: 1; pointer-events: auto; }

    .modal {
      background: white;
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 360px;
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.visible .modal { transform: scale(1); }

    .modal h3 { margin-bottom: 16px; font-size: 1.1rem; }
    .modal input { margin-bottom: 12px; }
    .modal .btn-row { display: flex; gap: 8px; margin-top: 4px; }
    .modal .btn-row button { flex: 1; }

    .btn-secondary { background: #F0F2F5; color: var(--text); }
    .btn-danger { background: var(--danger); color: white; }

    @media (max-width: 380px) {
      .budget-card .amount { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen" class="setup-screen" style="display:none;">
  <div class="card">
    <h2>Welcome!</h2>
    <p>Set up your shared budget tracker</p>
    <input type="text" id="setup-name1" placeholder="Your name" autocomplete="off">
    <input type="text" id="setup-name2" placeholder="Partner's name" autocomplete="off">
    <input type="number" id="setup-budget" placeholder="Monthly budget" inputmode="decimal" min="0">
    <button class="btn-primary" onclick="finishSetup()">Get Started</button>
  </div>
</div>

<!-- Main App -->
<div id="main-app" style="display:none;">
  <header>
    <h1 id="header-title">Our Budget</h1>
    <p id="header-subtitle">March 2026</p>
    <button class="settings-btn" onclick="openSettings()" aria-label="Settings">⚙</button>
  </header>

  <div class="budget-card">
    <div class="label">Remaining</div>
    <div class="amount" id="remaining">$0</div>
    <div class="progress-bar"><div class="fill" id="progress-fill" style="width:100%"></div></div>
    <div class="budget-row">
      <div class="col">
        <div class="label">Budget</div>
        <div class="val green" id="total-budget">$0</div>
      </div>
      <div class="col">
        <div class="label">Spent</div>
        <div class="val red" id="total-spent">$0</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Add Expense</div>
    <div class="card">
      <div class="tab-bar" id="person-tabs"></div>
      <input type="text" id="exp-desc" placeholder="What did you spend on?" autocomplete="off">
      <div class="form-row" style="margin-top:10px;">
        <input type="number" id="exp-amount" placeholder="Amount" inputmode="decimal" min="0" step="0.01">
        <button class="btn-set" onclick="addExpense()">Add</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Recent Expenses</div>
    <div class="card" id="expenses-card">
      <ul class="expense-list" id="expense-list"></ul>
      <div class="empty-state" id="empty-state">
        <div class="icon">📋</div>
        <div>No expenses yet.<br>Start tracking your spending!</div>
      </div>
    </div>
  </div>

  <div style="height:40px"></div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h3>Settings</h3>
    <input type="text" id="edit-name1" placeholder="Your name">
    <input type="text" id="edit-name2" placeholder="Partner's name">
    <input type="number" id="edit-budget" placeholder="Budget amount" inputmode="decimal" min="0">
    <div class="btn-row">
      <button class="btn-secondary" onclick="closeSettings()">Cancel</button>
      <button class="btn-primary" onclick="saveSettings()">Save</button>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn-danger" onclick="resetAll()">Reset Everything</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'noa_budget_v1';

let state = {
  name1: '',
  name2: '',
  budget: 0,
  expenses: [],
  activePerson: 0,
  setupDone: false
};

function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function fmt(n) {
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'ILS', minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(n);
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || '?';
}

function totalSpent() {
  return state.expenses.reduce((sum, e) => sum + e.amount, 0);
}

function render() {
  if (!state.setupDone) {
    document.getElementById('setup-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
    return;
  }

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';

  const spent = totalSpent();
  const remaining = state.budget - spent;
  const pct = state.budget > 0 ? Math.max(0, Math.min(100, (remaining / state.budget) * 100)) : 0;

  document.getElementById('header-title').textContent = `${state.name1} & ${state.name2}`;
  const now = new Date();
  document.getElementById('header-subtitle').textContent = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const remEl = document.getElementById('remaining');
  remEl.textContent = fmt(remaining);
  remEl.className = 'amount ' + (remaining > 0 ? 'positive' : remaining < 0 ? 'negative' : 'zero');

  document.getElementById('total-budget').textContent = fmt(state.budget);
  document.getElementById('total-spent').textContent = fmt(spent);

  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.className = 'fill' + (pct < 20 ? ' danger' : pct < 50 ? ' warning' : '');

  const tabBar = document.getElementById('person-tabs');
  tabBar.innerHTML = [state.name1, state.name2].map((name, i) =>
    `<button class="tab${state.activePerson === i ? ' active' : ''}" onclick="setPerson(${i})">${name}</button>`
  ).join('');

  const list = document.getElementById('expense-list');
  const empty = document.getElementById('empty-state');

  if (state.expenses.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    const sorted = [...state.expenses].sort((a, b) => b.ts - a.ts);
    list.innerHTML = sorted.map(e => {
      const personName = e.person === 0 ? state.name1 : state.name2;
      const avatarClass = e.person === 0 ? 'person1' : 'person2';
      const date = new Date(e.ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      return `<li class="expense-item">
        <div class="expense-avatar ${avatarClass}">${initials(personName)}</div>
        <div class="expense-info">
          <div class="desc">${escHtml(e.desc)}</div>
          <div class="meta">${escHtml(personName)} · ${date}</div>
        </div>
        <div class="expense-amount">-${fmt(e.amount)}</div>
        <button class="expense-delete" onclick="deleteExpense('${e.id}')" aria-label="Delete">×</button>
      </li>`;
    }).join('');
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function finishSetup() {
  const n1 = document.getElementById('setup-name1').value.trim();
  const n2 = document.getElementById('setup-name2').value.trim();
  const b = parseFloat(document.getElementById('setup-budget').value);
  if (!n1 || !n2) return alert('Please enter both names');
  if (!b || b <= 0) return alert('Please enter a valid budget');
  state.name1 = n1;
  state.name2 = n2;
  state.budget = b;
  state.setupDone = true;
  save();
  render();
}

function setPerson(i) {
  state.activePerson = i;
  render();
}

function addExpense() {
  const desc = document.getElementById('exp-desc').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value);
  if (!desc) return alert('Please add a description');
  if (!amount || amount <= 0) return alert('Please enter a valid amount');
  state.expenses.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    person: state.activePerson,
    desc,
    amount,
    ts: Date.now()
  });
  save();
  document.getElementById('exp-desc').value = '';
  document.getElementById('exp-amount').value = '';
  render();
}

function deleteExpense(id) {
  if (!confirm('Delete this expense?')) return;
  state.expenses = state.expenses.filter(e => e.id !== id);
  save();
  render();
}

function openSettings() {
  document.getElementById('edit-name1').value = state.name1;
  document.getElementById('edit-name2').value = state.name2;
  document.getElementById('edit-budget').value = state.budget;
  document.getElementById('settings-modal').classList.add('visible');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('visible');
}

function saveSettings() {
  const n1 = document.getElementById('edit-name1').value.trim();
  const n2 = document.getElementById('edit-name2').value.trim();
  const b = parseFloat(document.getElementById('edit-budget').value);
  if (!n1 || !n2) return alert('Please enter both names');
  if (!b || b <= 0) return alert('Please enter a valid budget');
  state.name1 = n1;
  state.name2 = n2;
  state.budget = b;
  save();
  closeSettings();
  render();
}

function resetAll() {
  if (!confirm('This will delete all data. Are you sure?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = { name1: '', name2: '', budget: 0, expenses: [], activePerson: 0, setupDone: false };
  closeSettings();
  render();
}

load();
render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
